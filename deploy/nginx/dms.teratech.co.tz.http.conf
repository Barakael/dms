# HTTP-only bootstrap — use BEFORE obtaining SSL certificate
# After cert exists, switch to dms.teratech.co.tz.conf (HTTPS)

upstream dms_php {
    server unix:/var/run/php/php8.4-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name dms.teratech.co.tz;

    client_max_body_size 26M;

    access_log /var/log/nginx/dms.teratech.co.tz.access.log;
    error_log  /var/log/nginx/dms.teratech.co.tz.error.log;

    root /var/www/dms/frontend/dist;
    index index.html;

    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ^~ /signed {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_read_timeout 300;
    }

    location = /up {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
