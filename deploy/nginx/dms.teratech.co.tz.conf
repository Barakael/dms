# Company DMS — http://dms.teratech.co.tz
# Install on server:
#   sudo cp /var/www/dms/deploy/nginx/dms.teratech.co.tz.conf /etc/nginx/sites-available/dms.teratech.co.tz
#   sudo ln -sf /etc/nginx/sites-available/dms.teratech.co.tz /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# Adjust php-fpm socket if needed (php8.2-fpm.sock, php8.3-fpm.sock, etc.)

upstream dms_php {
    server unix:/var/run/php/php8.2-fpm.sock;
}

server {
    listen 80;
    listen [::]:80;
    server_name dms.teratech.co.tz;

    # Match MAX_UPLOAD_SIZE in backend/.env (25 MB) with a small buffer
    client_max_body_size 26M;

    access_log /var/log/nginx/dms.teratech.co.tz.access.log;
    error_log  /var/log/nginx/dms.teratech.co.tz.error.log;

    # React SPA (built with: cd /var/www/dms/frontend && npm run build)
    root /var/www/dms/frontend/dist;
    index index.html;

    # Laravel API (/api/*)
    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # Signed document download/preview URLs
    location ^~ /signed {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_read_timeout 300;
    }

    # Laravel health check (optional)
    location = /up {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
    }

    # React client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static asset caching
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
