# Company DMS — https://dms.teratech.co.tz
#
# IMPORTANT: Do NOT install this file until the certificate exists!
#
# Correct order:
#   1. sudo cp deploy/nginx/dms.teratech.co.tz.http.conf /etc/nginx/sites-available/dms.teratech.co.tz
#   2. sudo nginx -t && sudo systemctl reload nginx
#   3. sudo certbot certonly --nginx -d dms.teratech.co.tz
#   4. sudo cp deploy/nginx/dms.teratech.co.tz.conf /etc/nginx/sites-available/dms.teratech.co.tz
#   5. sudo nginx -t && sudo systemctl reload nginx
#
# Or run: CERTBOT_EMAIL=you@teratech.co.tz ./deploy/nginx/obtain-ssl.sh

upstream dms_php {
    server unix:/var/run/php/php8.4-fpm.sock;
}

# Redirect HTTP → HTTPS (keeps Let's Encrypt renewal working)
server {
    listen 80;
    listen [::]:80;
    server_name dms.teratech.co.tz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name dms.teratech.co.tz;

    ssl_certificate /etc/letsencrypt/live/dms.teratech.co.tz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dms.teratech.co.tz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 26M;

    access_log /var/log/nginx/dms.teratech.co.tz.access.log;
    error_log  /var/log/nginx/dms.teratech.co.tz.error.log;

    root /var/www/dms/frontend/dist;
    index index.html;

    location ^~ /api {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    location ^~ /signed {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
        fastcgi_read_timeout 300;
    }

    location = /up {
        include fastcgi_params;
        fastcgi_pass dms_php;
        fastcgi_param SCRIPT_FILENAME /var/www/dms/backend/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/dms/backend/public;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
}
